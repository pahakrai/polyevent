# ============================================================
# Pull request checks: lint, test, and build verification.
# Uses NX affected to only build changed services (dry-run).
# Does NOT push images or deploy.
# ============================================================

name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Lint & test (always runs)
  # ------------------------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run test

  # ------------------------------------------------------------------
  # Detect which deployable services changed
  # ------------------------------------------------------------------
  detect-changes:
    name: Detect Affected Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.affected.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Compute affected services
        id: affected
        run: |
          DEPLOYABLE='["api-gateway","auth-service","user-service","vendor-service","event-service","frontend"]'

          AFFECTED=$(npx nx show projects --affected --base=origin/main --head=HEAD --json)
          echo "All NX-affected projects: $AFFECTED"

          FILTERED=$(echo "$AFFECTED" | jq -c "[.[] | select(. as \$p | $DEPLOYABLE | index(\$p))]")

          if git diff --name-only origin/main..HEAD | grep -q '^apps/python-workers/'; then
            FILTERED=$(echo "$FILTERED" | jq -c '. + ["python-workers"]')
          fi

          echo "Deployable affected: $FILTERED"
          echo "services=$FILTERED" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------
  # Build affected images (dry-run — no push)
  # ------------------------------------------------------------------
  build-images:
    name: Build Images (dry-run)
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Dockerfile path
        id: paths
        run: |
          case "${{ matrix.service }}" in
            frontend)       echo "dockerfile=apps/frontend/Dockerfile" >> $GITHUB_OUTPUT
                           echo "target=runner" >> $GITHUB_OUTPUT ;;
            python-workers) echo "dockerfile=apps/python-workers/Dockerfile" >> $GITHUB_OUTPUT
                           echo "target=" >> $GITHUB_OUTPUT ;;
            *)              echo "dockerfile=apps/nestjs-services/${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
                           echo "target=production" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.paths.outputs.dockerfile }}
          target: ${{ steps.paths.outputs.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # Validate Kustomize manifests
  # ------------------------------------------------------------------
  validate-kustomize:
    name: Validate Kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate base
        run: kubectl kustomize kubernetes/base

      - name: Validate production overlay
        run: kubectl kustomize kubernetes/overlays/production

      - name: Validate staging overlay
        run: kubectl kustomize kubernetes/overlays/staging

  # ------------------------------------------------------------------
  # Validate Dockerfiles reference all shared libs
  # ------------------------------------------------------------------
  validate-dockerfiles:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check lib references
        run: node scripts/validate-dockerfiles.mjs
