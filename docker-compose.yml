# ============================================================================
# PolyEvent — Full Development Platform
# Run everything with a single command:  docker compose up
#
# Hot reload: source code is volume-mounted, services restart on file changes.
# First run takes a few minutes (npm ci). Subsequent runs are cached.
# ============================================================================

version: '3.8'

services:
  # =========================================================================
  # Infrastructure
  # =========================================================================

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eventbooking
      POSTGRES_PASSWORD: eventbooking123
      POSTGRES_DB: eventbooking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventbooking"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongopass123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redispass123
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 3

  kibana:
    image: kibana:8.11.0
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./tools/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # =========================================================================
  # Application Services — hot reload via volume mounts + watch mode
  # =========================================================================

  api-gateway:
    build:
      context: .
      dockerfile: ./apps/nestjs-services/api-gateway/Dockerfile
      target: deps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      GATEWAY_DATABASE_URL: postgresql://eventbooking:eventbooking123@postgres:5432/gateway_db
      REDIS_URL: redis://:redispass123@redis:6379
      KAFKA_BROKERS: kafka:9092
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/nestjs-services/api-gateway/node_modules
    command: npx nest start --watch
    working_dir: /app/apps/nestjs-services/api-gateway

  auth-service:
    build:
      context: .
      dockerfile: ./apps/nestjs-services/auth-service/Dockerfile
      target: deps
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      AUTH_DATABASE_URL: postgresql://eventbooking:eventbooking123@postgres:5432/auth_db
      REDIS_URL: redis://:redispass123@redis:6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/nestjs-services/auth-service/node_modules
    command: npx nest start --watch
    working_dir: /app/apps/nestjs-services/auth-service

  user-service:
    build:
      context: .
      dockerfile: ./apps/nestjs-services/user-service/Dockerfile
      target: deps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      USER_DATABASE_URL: postgresql://eventbooking:eventbooking123@postgres:5432/user_db
      REDIS_URL: redis://:redispass123@redis:6379
      PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/nestjs-services/user-service/node_modules
    command: npx nest start --watch
    working_dir: /app/apps/nestjs-services/user-service

  vendor-service:
    build:
      context: .
      dockerfile: ./apps/nestjs-services/vendor-service/Dockerfile
      target: deps
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      VENDOR_DATABASE_URL: postgresql://eventbooking:eventbooking123@postgres:5432/vendor_db
      REDIS_URL: redis://:redispass123@redis:6379
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/nestjs-services/vendor-service/node_modules
    command: npx nest start --watch
    working_dir: /app/apps/nestjs-services/vendor-service

  event-service:
    build:
      context: .
      dockerfile: ./apps/nestjs-services/event-service/Dockerfile
      target: deps
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development
      EVENT_DATABASE_URL: postgresql://eventbooking:eventbooking123@postgres:5432/event_db
      REDIS_URL: redis://:redispass123@redis:6379
      KAFKA_BROKERS: kafka:9092
      PORT: 3004
    ports:
      - "3004:3004"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/nestjs-services/event-service/node_modules
    command: npx nest start --watch
    working_dir: /app/apps/nestjs-services/event-service

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: deps
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3005:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    command: npx next dev
    working_dir: /app/apps/frontend

  # =========================================================================
  # Python Workers
  # =========================================================================

  kafka-consumers:
    build:
      context: ./apps/python-workers
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: python-workers-dev
      FEATURE_STORE_URL: redis://:redispass123@redis:6379
    volumes:
      - ./apps/python-workers:/app
    command: python -m kafka-consumers.user_activity
    restart: unless-stopped

  ml-training:
    build:
      context: ./apps/python-workers
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      FEATURE_STORE_URL: redis://:redispass123@redis:6379
      TRAINING_DATA_PATH: /data/training
      PIPELINE_MODE: incremental
      PIPELINE_WINDOW_DAYS: "30"
    volumes:
      - ./apps/python-workers:/app
      - training_data:/data/training
    command: python -m ml-training.data_pipeline
    restart: "no"

  inference:
    build:
      context: ./apps/python-workers
      dockerfile: Dockerfile
    depends_on:
      - redis
      - elasticsearch
    environment:
      KAFKA_BROKERS: kafka:9092
      FEATURE_STORE_URL: redis://:redispass123@redis:6379
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      MODEL_PATH: /data/training/models
      MODEL_VERSION: latest
    ports:
      - "8000:8000"
    volumes:
      - ./apps/python-workers:/app
      - training_data:/data/training
    command: uvicorn inference.api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  mongodb_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  training_data:
