# Production overlay — apply with:
#   kubectl apply -k kubernetes/overlays/production
#
# Before deploying, configure:
#   1. Image registry URL and tags (or set via CI/CD with kustomize edit)
#   2. Secrets via SealedSecrets or External Secrets Operator
#   3. Ingress hostnames and TLS certificates
#   4. Resource limits based on expected load
#
# Example registry configurations:
#   DigitalOcean:  registry.digitalocean.com/<project>/
#   AWS ECR:       <account>.dkr.ecr.<region>.amazonaws.com/
#   GCP GCR:       gcr.io/<project>/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base

images:
  - name: polydom/api-gateway
    newTag: latest
  - name: polydom/auth-service
    newTag: latest
  - name: polydom/user-service
    newTag: latest
  - name: polydom/vendor-service
    newTag: latest
  - name: polydom/event-service
    newTag: latest
  - name: polydom/frontend
    newTag: latest

patches:
  # API Gateway — 3 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 3
    target:
      kind: Deployment
      name: api-gateway

  # Auth Service — 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: auth-service
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: auth-service

  # User Service — 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: user-service
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: user-service

  # Vendor Service — 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vendor-service
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: vendor-service

  # Event Service — 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: event-service
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: event-service

  # Frontend — 2 replicas
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: frontend
