---
# ============================================================
# Python Workers — ML Training
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-training
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-training
  template:
    metadata:
      labels:
        app: ml-training
    spec:
      containers:
      - name: ml-training
        image: polydom/python-workers:dev
        imagePullPolicy: Never
        command: ["python", "-m", "ml-training.data_pipeline"]
        env:
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: kafka-brokers
        - name: FEATURE_STORE_URL
          value: redis://redis:6379
        - name: ELASTICSEARCH_HOSTS
          valueFrom:
            secretKeyRef:
              name: elasticsearch-secrets
              key: elasticsearch-hosts
        - name: TRAINING_DATA_PATH
          value: /data/training
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"

---
# ============================================================
# Python Workers — Inference (Search Ranker)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
      - name: inference
        image: polydom/python-workers:dev
        imagePullPolicy: Never
        command: ["uvicorn", "inference.api:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: kafka-brokers
        - name: FEATURE_STORE_URL
          value: redis://redis:6379
        - name: ELASTICSEARCH_HOSTS
          valueFrom:
            secretKeyRef:
              name: elasticsearch-secrets
              key: elasticsearch-hosts
        - name: MODEL_PATH
          value: /data/training/models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: polydom-dev
spec:
  selector:
    app: inference
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---
# ============================================================
# Python Workers — Kafka Consumers (User Activity)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumers
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumers
  template:
    metadata:
      labels:
        app: kafka-consumers
    spec:
      containers:
      - name: kafka-consumers
        image: polydom/python-workers:dev
        imagePullPolicy: Never
        command: ["python", "-m", "kafka-consumers.user_activity"]
        env:
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: kafka-secrets
              key: kafka-brokers
        - name: FEATURE_STORE_URL
          value: redis://redis:6379
        - name: KAFKA_CONSUMER_GROUP
          value: python-workers
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
