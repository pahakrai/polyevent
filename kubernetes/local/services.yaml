# Application services — local dev settings: 1 replica, low resources
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: polydom/api-gateway:dev
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: GATEWAY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: gateway-database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: redis-url
        - name: NODE_ENV
          value: development
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: polydom-dev
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort

