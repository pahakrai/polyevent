# Local dev services — all NestJS microservices + Frontend
# Skaffold auto-replaces image tags with content-hash tags at deploy time.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: polydom-dev

---
# ============================================================
# API Gateway
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: polydom-dev
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api-gateway
        image: polydom/api-gateway:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 9229
          name: debug
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: NODE_ENV
          value: development
        - name: NODE_OPTIONS
          value: "--max-old-space-size=480"
        - name: GATEWAY_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: gateway-database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: redis-url
        - name: AUTH_SERVICE_URL
          value: http://auth-service:3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: polydom-dev
spec:
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  - port: 9229
    targetPort: 9229
    name: debug
  type: NodePort

---
