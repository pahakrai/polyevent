# Per-service PostgreSQL instances — database-per-service pattern
# Each microservice gets its own PostgreSQL pod + PVC + Service
---
# ============================================================
# Gateway DB
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-gateway-pvc
  namespace: polydom-dev
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-gateway
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-gateway
  template:
    metadata:
      labels:
        app: postgres-gateway
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: eventbooking
        - name: POSTGRES_PASSWORD
          value: eventbooking123
        - name: POSTGRES_DB
          value: gateway_db
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-gateway-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-gateway
  namespace: polydom-dev
spec:
  selector:
    app: postgres-gateway
  ports:
  - port: 5432

