# Single shared PostgreSQL — lightweight dev (NOT database-per-service)
# All service databases created via init script on first boot
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: polydom-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: polydom-dev
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init
        secret:
          secretName: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: polydom-dev
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
# PostgreSQL MCP server — read-only database access for the agent service
# crystaldba/postgres-mcp exposes a `query` tool via SSE transport
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-mcp
  namespace: polydom-dev
  labels:
    app: postgres-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-mcp
  template:
    metadata:
      labels:
        app: postgres-mcp
    spec:
      containers:
      - name: postgres-mcp
        image: crystaldba/postgres-mcp:latest
        ports:
        - containerPort: 8099
          name: http
        env:
        - name: DATABASE_URI
          value: "postgresql://postgres:postgres@postgres:5432/vendor_db"
        args:
        - "--transport=sse"
        - "--sse-port=8099"
        - "--access-mode=restricted"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 8099
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8099
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-mcp
  namespace: polydom-dev
spec:
  selector:
    app: postgres-mcp
  ports:
  - port: 8099
    targetPort: 8099
    name: http
