# Single shared PostgreSQL — lightweight dev (NOT database-per-service)
# All service databases created via init script on first boot
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: polydom-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: polydom-dev
data:
  init.sql: |
    CREATE DATABASE gateway_db;
    CREATE DATABASE auth_db;
    CREATE DATABASE user_db;
    CREATE DATABASE vendor_db;
    CREATE DATABASE event_db;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: polydom-dev
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: polydom-dev
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
