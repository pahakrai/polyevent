# Local dev infrastructure — single replicas, modest resources, no HA
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: polydom-dev
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: polydom-dev
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: polydom-dev
data:
  01-create-databases.sql: |
    CREATE DATABASE gateway_db;
    CREATE DATABASE auth_db;
    CREATE DATABASE user_db;
    CREATE DATABASE vendor_db;
    CREATE DATABASE event_db;
    GRANT ALL PRIVILEGES ON DATABASE gateway_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE user_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE vendor_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE event_db TO eventbooking;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: eventbooking
        - name: POSTGRES_PASSWORD
          value: eventbooking123
        - name: POSTGRES_DB
          value: eventbooking
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: polydom-dev
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: polydom-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--requirepass", "redispass123", "--appendonly", "yes"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: polydom-dev
spec:
  selector:
    app: redis
  ports:
  - port: 6379
