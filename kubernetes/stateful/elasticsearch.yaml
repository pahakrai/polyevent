# ============================================================================
# Elasticsearch — For production, use ECK operator (Elastic Cloud on K8s).
# ECK provides: automated rolling upgrades, snapshots, autoscaling, monitoring.
#
# Install:  kubectl create -f https://download.elastic.co/downloads/eck/2.x/crds.yaml
#            kubectl apply -f https://download.elastic.co/downloads/eck/2.x/operator.yaml
#
# Then create an Elasticsearch CR:
#
#   apiVersion: elasticsearch.k8s.elastic.co/v1
#   kind: Elasticsearch
#   metadata:
#     name: eventbooking-es
#     namespace: production
#   spec:
#     version: 8.11.0
#     nodeSets:
#       - name: default
#         count: 3
#         config:
#           node.store.allow_mmap: false
#         podTemplate:
#           spec:
#             containers:
#               - name: elasticsearch
#                 resources:
#                   requests:
#                     memory: 2Gi
#                     cpu: 1
#                   limits:
#                     memory: 4Gi
#                     cpu: 2
#         volumeClaimTemplates:
#           - metadata:
#               name: elasticsearch-data
#             spec:
#               accessModes: [ReadWriteOnce]
#               resources:
#                 requests:
#                   storage: 50Gi
#
# This file documents the expected endpoint for app services.
# ============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
  namespace: production
  labels:
    app: elasticsearch
spec:
  selector:
    app: elasticsearch
  ports:
  - protocol: TCP
    port: 9200
    targetPort: 9200
