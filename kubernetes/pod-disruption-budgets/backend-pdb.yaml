# Ensure at least 1 replica per backend service is always available.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vendor-service-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vendor-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: event-service-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: event-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
