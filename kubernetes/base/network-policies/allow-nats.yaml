# Allow backend services to reach NATS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nats
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: nats
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 4222
  policyTypes:
    - Ingress
