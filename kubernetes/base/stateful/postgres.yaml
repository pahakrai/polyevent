# PostgreSQL — single-instance with persistent storage.
# For production HA: use CloudNativePG operator (https://cloudnative-pg.io)
#
# Note: For production, prefer Neon PostgreSQL (already configured via USE_NEON=true).
# This in-cluster instance is a self-hosted fallback.
#
# Storage class per cloud (change in overlay or via Kustomize):
#   DigitalOcean:  do-block-storage
#   AWS EKS:       gp3
#   GCP GKE:       standard-rwo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: production
type: Opaque
stringData:
  POSTGRES_USER: "eventbooking"
  POSTGRES_PASSWORD: "change-me-use-sealed-secrets"
  POSTGRES_DB: "eventbooking"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: production
data:
  01-create-databases.sql: |
    CREATE DATABASE gateway_db;
    CREATE DATABASE auth_db;
    CREATE DATABASE user_db;
    CREATE DATABASE vendor_db;
    CREATE DATABASE event_db;
    CREATE DATABASE booking_db;
    CREATE DATABASE notification_db;
    CREATE DATABASE analytics_db;
    CREATE DATABASE admin_db;
    CREATE DATABASE agent_db;
    GRANT ALL PRIVILEGES ON DATABASE gateway_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE auth_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE user_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE vendor_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE event_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE booking_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE notification_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE analytics_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE admin_db TO eventbooking;
    GRANT ALL PRIVILEGES ON DATABASE agent_db TO eventbooking;
    \c agent_db
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: infrastructure
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres
        image: pgvector/pgvector:pg15
        ports:
        - containerPort: 5432
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        envFrom:
        - secretRef:
            name: postgres-credentials
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "eventbooking"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "eventbooking"]
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-scripts
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: production
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
---
# PostgreSQL MCP server — read-only database access for the agent service
# crystaldba/postgres-mcp exposes a `query` tool via SSE transport
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-mcp
  namespace: production
  labels:
    app: postgres-mcp
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-mcp
  template:
    metadata:
      labels:
        app: postgres-mcp
        tier: infrastructure
    spec:
      containers:
      - name: postgres-mcp
        image: crystaldba/postgres-mcp:latest
        ports:
        - containerPort: 8099
          protocol: TCP
        envFrom:
        - secretRef:
            name: postgres-credentials
        env:
        - name: DATABASE_URI
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/vendor_db"
        args:
        - "--transport=sse"
        - "--sse-port=8099"
        - "--access-mode=restricted"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 8099
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8099
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-mcp
  namespace: production
spec:
  selector:
    app: postgres-mcp
  ports:
  - protocol: TCP
    port: 8099
    targetPort: 8099
  type: ClusterIP
