# NATS message broker — single replica for development/production
---
apiVersion: v1
kind: Service
metadata:
  name: nats-service
  namespace: production
  labels:
    app: nats
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
  - name: client
    protocol: TCP
    port: 4222
    targetPort: 4222
  - name: monitoring
    protocol: TCP
    port: 8222
    targetPort: 8222
