# ============================================================
# Skaffold configuration — polydom monorepo (development only)
#
# NX-aware build pipeline:
#   Dockerfiles use `nx build <project>` which resolves the full
#   dependency graph, uses NX computation caching, and only rebuilds
#   what changed. Skaffold handles image tagging + K8s deploy.
#
# Development:
#   Frontend (Next.js): file sync → hot reload on save, no rebuild.
#   Backend (NestJS):  no sync, no watch. Restart manually via
#     `kubectl rollout restart deployment/<name>` on code changes.
#
# Usage:
#   skaffold dev --port-forward    Dev mode with hot reload + port-forward
#   skaffold run --port-forward    One-shot local deploy
#   skaffold build                 Build images only
#
# For production / staging, use Kustomize directly:
#   kubectl apply -k kubernetes/overlays/production
#   kubectl apply -k kubernetes/overlays/staging
# ============================================================
apiVersion: skaffold/v4beta5
kind: Config
metadata:
  name: polydom

build:
  tagPolicy:
    sha256: {}
  artifacts:
    - image: polydom/api-gateway
      context: .
      docker:
        dockerfile: apps/nestjs-services/api-gateway/Dockerfile
        target: development
    - image: polydom/auth-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/auth-service/Dockerfile
        target: development
    - image: polydom/user-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/user-service/Dockerfile
        target: development
    - image: polydom/vendor-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/vendor-service/Dockerfile
        target: development
    - image: polydom/event-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/event-service/Dockerfile
        target: development
    - image: polydom/agent-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/agent-service/Dockerfile
        target: development
    - image: polydom/frontend
      context: .
      docker:
        dockerfile: apps/frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/apps/frontend/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/libs/
    - image: polydom/admin-frontend
      context: .
      docker:
        dockerfile: apps/admin-frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/admin-frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/apps/admin-frontend/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/libs/
  local:
    push: false

manifests:
  rawYaml:
    - kubernetes/local/namespace.yaml
    - kubernetes/local/secrets.yaml
    - kubernetes/local/postgres.yaml
    - kubernetes/local/infrastructure.yaml
    - kubernetes/local/services.yaml
    - kubernetes/local/ingress.yaml

deploy:
  kubectl: {}

portForward:
  - resourceType: service
    resourceName: api-gateway
    namespace: polydom-dev
    port: 3000
    localPort: 3000
  - resourceType: service
    resourceName: api-gateway
    namespace: polydom-dev
    port: 9229
    localPort: 9229
  - resourceType: service
    resourceName: auth-service
    namespace: polydom-dev
    port: 3000
    localPort: 3010
  - resourceType: service
    resourceName: auth-service
    namespace: polydom-dev
    port: 9230
    localPort: 9230
  - resourceType: service
    resourceName: user-service
    namespace: polydom-dev
    port: 3000
    localPort: 3020
  - resourceType: service
    resourceName: user-service
    namespace: polydom-dev
    port: 9231
    localPort: 9231
  - resourceType: service
    resourceName: vendor-service
    namespace: polydom-dev
    port: 3000
    localPort: 3030
  - resourceType: service
    resourceName: vendor-service
    namespace: polydom-dev
    port: 9232
    localPort: 9232
  - resourceType: service
    resourceName: event-service
    namespace: polydom-dev
    port: 3000
    localPort: 3040
  - resourceType: service
    resourceName: event-service
    namespace: polydom-dev
    port: 9233
    localPort: 9233
  - resourceType: service
    resourceName: frontend
    namespace: polydom-dev
    port: 3000
    localPort: 3002
  - resourceType: service
    resourceName: admin-frontend
    namespace: polydom-dev
    port: 3000
    localPort: 3004
  - resourceType: service
    resourceName: agent-service
    namespace: polydom-dev
    port: 3010
    localPort: 3050
