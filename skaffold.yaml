# ============================================================
# Skaffold configuration — polydom monorepo (development only)
#
# NX-aware build pipeline:
#   Dockerfiles use `nx build <project>` which resolves the full
#   dependency graph, uses NX computation caching, and only rebuilds
#   what changed. Skaffold handles image tagging + K8s deploy.
#
# Development:
#   Frontend (Next.js): file sync → hot reload on save, no rebuild.
#   Backend (NestJS):  file sync → webpack watch rebuild inside container.
#     No pod restart needed on source changes. For new dependencies or
#     config changes, rebuild the image with `skaffold build`.
#
# Usage:
#   skaffold dev --port-forward    Dev mode with hot reload + port-forward
#   skaffold run --port-forward    One-shot local deploy
#   skaffold build                 Build images only
#
# For production / staging, use Kustomize directly:
#   kubectl apply -k kubernetes/overlays/production
#   kubectl apply -k kubernetes/overlays/staging
# ============================================================
apiVersion: skaffold/v4beta5
kind: Config
metadata:
  name: polydom

build:
  tagPolicy:
    envTemplate:
      template: "latest"
  artifacts:
    - image: polydom/api-gateway
      context: .
      docker:
        dockerfile: apps/nestjs-services/api-gateway/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/api-gateway/src/**/*.ts'
            dest: /app/apps/nestjs-services/api-gateway/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/auth-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/auth-service/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/auth-service/src/**/*.ts'
            dest: /app/apps/nestjs-services/auth-service/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/user-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/user-service/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/user-service/src/**/*.ts'
            dest: /app/apps/nestjs-services/user-service/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/vendor-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/vendor-service/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/vendor-service/src/**/*.ts'
            dest: /app/apps/nestjs-services/vendor-service/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/event-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/event-service/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/event-service/src/**/*.ts'
            dest: /app/apps/nestjs-services/event-service/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/agent-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/agent-service/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/nestjs-services/agent-service/src/**/*.ts'
            dest: /app/apps/nestjs-services/agent-service/src/
          - src: 'libs/**/src/**/*.ts'
            dest: /app/libs/
    - image: polydom/frontend
      context: .
      docker:
        dockerfile: apps/frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/apps/frontend/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/libs/
    - image: polydom/admin-frontend
      context: .
      docker:
        dockerfile: apps/admin-frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/admin-frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/apps/admin-frontend/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/libs/
  local:
    push: false

manifests:
  rawYaml:
    - kubernetes/local/namespace.yaml
    - kubernetes/local/secrets.yaml
    - kubernetes/local/postgres.yaml
    - kubernetes/local/pgadmin.yaml
    - kubernetes/local/infrastructure.yaml
    - kubernetes/local/services.yaml
    - kubernetes/local/ingress.yaml

deploy:
  kubectl: {}

profiles:
  - name: production
    build:
      artifacts:
        - image: polydom/api-gateway
          docker:
            target: production
        - image: polydom/auth-service
          docker:
            target: production
        - image: polydom/user-service
          docker:
            target: production
        - image: polydom/vendor-service
          docker:
            target: production
        - image: polydom/event-service
          docker:
            target: production
        - image: polydom/agent-service
          docker:
            target: production
        - image: polydom/frontend
          docker:
            target: runner
        - image: polydom/admin-frontend
          docker:
            target: runner
      local:
        push: true
      tagPolicy:
        gitCommit: {}
  - name: staging
    build:
      artifacts:
        - image: polydom/api-gateway
          docker:
            target: production
        - image: polydom/auth-service
          docker:
            target: production
        - image: polydom/user-service
          docker:
            target: production
        - image: polydom/vendor-service
          docker:
            target: production
        - image: polydom/event-service
          docker:
            target: production
        - image: polydom/agent-service
          docker:
            target: production
        - image: polydom/frontend
          docker:
            target: runner
        - image: polydom/admin-frontend
          docker:
            target: runner
      local:
        push: true
      tagPolicy:
        gitCommit: {}

